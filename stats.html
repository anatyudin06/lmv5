<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Результати та статистика матчів команди FC GOAL ENGINE.">
    <title>Статистика | FC GOAL ENGINE</title>

    <link rel="icon" type="image/png" href="./img/favicon.png">

    <link rel="preload" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" as="style"
        onload="this.onload=null;this.rel='stylesheet'">

    <noscript>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    </noscript>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="border-bottom py-3">
        <div class="container d-flex justify-content-between align-items-center">
            <a href="index.html" class="d-flex align-items-center text-dark text-decoration-none">
                <img src="./img/logo.svg" alt="logo" class="logo-sm me-2">
                <span class="logo-title">FC GOAL ENGINE</span>
            </a>

            <button class="nav-toggle" id="navToggle" aria-label="Відкрити меню" aria-expanded="false"
                aria-controls="mainNav">
                <span></span>
            </button>

            <ul class="nav nav-pills" id="mainNav">
                <li class="nav-item"><a href="index.html" class="nav-link text-dark">Головна</a></li>
                <li class="nav-item"><a href="about.html" class="nav-link text-dark">Про нас</a></li>
                <li class="nav-item"><a href="#" class="nav-link text-dark">Досягнення</a></li>
                <li class="nav-item"><a href="stats.html" class="nav-link text-dark fw-bold">Статистика матчів</a></li>
            </ul>
        </div>
    </header>

    <main class="container py-5">

        <h1 class="visually-hidden">Статистика матчів</h1>

        <section class="text-center mb-5 pb-4 border-bottom">
            <h2 class="h3 fw-bold mb-1">TUESDAY 10 MARCH</h2>

            <p class="text-muted mb-4">Semi-finals</p>

            <div class="d-flex justify-content-center align-items-center gap-4 flex-wrap">
                <div class="fs-4 fw-bold">FC GOAL ENGINE</div>

                <img src="./img/logo.svg" class="logo-sm" alt="team logo">

                <div class="fs-2 fw-bold">3 - 1</div>

                <img src="./img/l1.svg" class="logo-sm" alt="team logo">

                <div class="fs-4 fw-bold">FC STORM</div>
            </div>
        </section>

        <section class="px-5">
            <h2 class="text-center fw-bold mb-4">Результати</h2>

            <div class="d-flex flex-column">
                <div class="match-row d-flex flex-wrap align-items-center justify-content-between">

                    <div class="fw-bold col-12 col-lg-2 mb-2 mb-lg-0">
                        SAT 06 APR
                    </div>

                    <div class="text-muted col-12 col-lg-2 mb-2 mb-lg-0">
                        Premier League
                    </div>

                    <div class="col-12 col-lg-8 d-flex align-items-center justify-content-lg-end gap-3">
                        <span class="fw-bold">FC GOAL ENGINE</span>

                        <img src="./img/logo.svg" class="logo-sm" alt="team">

                        <span class="fw-bold">2 - 0</span>

                        <img src="./img/l2.svg" class="logo-sm" alt="team">

                        <span class="fw-bold">FC PHOENIX</span>
                    </div>

                </div>

            </div>
        </section>

    </main>

    <footer class="py-4 mt-auto border-top">
        <div class="container d-flex justify-content-between align-items-center">

            <div class="d-flex align-items-center">
                <img src="./img/logo.svg" alt="logo" class="logo-sm me-2">
                <span class="logo-title">FC GOAL ENGINE</span>
            </div>

            <ul class="nav list-unstyled d-flex">
                <li class="ms-3"><img src="./img/facebook_icon.svg" class="footer-icon" alt=""></li>
                <li class="ms-3"><img src="./img/linkedin_icon.svg" class="footer-icon" alt=""></li>
                <li class="ms-3"><img src="./img/youtube_icon.svg" class="footer-icon" alt=""></li>
                <li class="ms-3"><img src="./img/instagram_icon.svg" class="footer-icon" alt=""></li>
            </ul>

        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const toggle = document.getElementById('navToggle');
        const nav = document.getElementById('mainNav');
        toggle.addEventListener('click', () => {
            const open = nav.classList.toggle('open');
            toggle.classList.toggle('open', open);
            toggle.setAttribute('aria-expanded', open);
        });
        nav.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', () => {
                nav.classList.remove('open');
                toggle.classList.remove('open');
                toggle.setAttribute('aria-expanded', 'false');
            });
        });
    </script>
</body>

</html>
